<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel TV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background-color: #222; color: #eee; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #player-container { width: 90%; max-width: 800px; margin-bottom: 20px; }
        video { width: 100%; height: auto; background-color: #000; }
        #controls { display: flex; gap: 10px; margin-bottom: 20px; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #555; background-color: #333; color: #eee; }
        button { padding: 10px 15px; border-radius: 5px; border: none; background-color: #007bff; color: white; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #status { font-style: italic; color: #888; }
    </style>
</head>
<body>

    <h1>Vercel TV Player</h1>

    <div id="player-container">
        <video id="videoPlayer" controls></video>
    </div>

    <div id="controls">
        <input type="text" id="channelName" placeholder="Enter Channel Name (e.g., Astro Cricket)" size="40">
        <button onclick="playChannel()">Play</button>
    </div>
    
    <p id="status">Enter a channel name to begin.</p>

    <script>
        const video = document.getElementById('videoPlayer');
        const channelNameInput = document.getElementById('channelName');
        const statusElement = document.getElementById('status');
        let hls;

        function playChannel() {
            const channelName = channelNameInput.value.trim();

            if (!channelName) {
                statusElement.textContent = 'Please enter a channel name.';
                return;
            }
            
            // The API endpoint is now on the same host, under /api/proxy
            const streamUrl = `/api/proxy?channel=${encodeURIComponent(channelName)}`;
            statusElement.textContent = `Requesting stream for: ${channelName}`;

            console.log(`Attempting to play: ${streamUrl}`);

            if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy();
                }
                hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    statusElement.textContent = `Playing: ${channelName}`;
                });
                 hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        console.error('Fatal HLS error:', data);
                        statusElement.textContent = `Error loading stream: ${data.details}. Check console for more info.`;
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => {
                    video.play();
                    statusElement.textContent = `Playing: ${channelName}`;
                });
                 video.addEventListener('error', () => {
                    statusElement.textContent = 'Error playing the stream with native player.';
                });
            }
        }
    </script>

</body>
</html>
